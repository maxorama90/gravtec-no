<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravtec AS - Maskinutleie Haugalandet</title>
    <meta name="description" content="Utleie av Kobelco SK75SR-7 på Haugalandet. Kraftig og velutstyrt 8-tonner.">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            line-height: 1.7;
        }
        
        header {
            background: #0D2B3A;
            color: white;
            padding: 30px 20px 40px 20px;
            text-align: center;
        }
        
        .logo {
            max-width: 360px;
            height: auto;
            display: block;
            margin: 0 auto 15px auto;
        }
        
        h1 {
            margin: 0;
            font-size: 1.8em;
            font-weight: 600;
        }
        
        section {
            max-width: 820px;
            margin: 0 auto;
            padding: 32px 20px;
        }
        
        h2 {
            color: #0D2B3A;
            font-size: 1.4em;
            margin-bottom: 15px;
        }
        
        .intro {
            text-align: center;
            max-width: 560px;
            margin: 0 auto 25px auto;
        }
        
        .utstyr {
            max-width: 360px;
            margin: 0 auto;
        }
        
        .maskin {
            width: 100%;
            max-width: 820px;
            height: auto;
            border-radius: 12px;
            margin: 30px auto;
            display: block;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }
        
        form {
            background: #f8f9fa;
            padding: 28px;
            border-radius: 14px;
            max-width: 440px;
            margin: 0 auto;
            box-shadow: 0 5px 18px rgba(0,0,0,0.08);
        }
        
        input, textarea {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 9px;
            font-size: 1.05em;
            box-sizing: border-box;
        }
        
        button {
            background: #0D2B3A;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            font-size: 1.1em;
            border-radius: 9px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
        }
        
        button:hover {
            background: #08202B;
        }
        
        footer {
            background: #0D2B3A;
            color: white;
            text-align: center;
            padding: 35px 20px;
            font-size: 0.95em;
        }
        
        @media (max-width: 600px) {
            header { padding: 25px 15px 35px 15px; }
            .logo { max-width: 290px; }
            h1 { font-size: 1.5em; }
            h2 { font-size: 1.3em; }
            section { padding: 28px 15px; }
            form { padding: 22px; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <img src="images/gravtec testlogo.png" alt="Gravtec AS logo" class="logo">
        <h1>Maskinutleie på Haugalandet</h1>
    </header>

    <!-- INTRO -->
    <section class="intro">
        <h2>Utleie av Kobelco SK75SR-7</h2>
        <p style="font-size: 1.12em;">
            Kraftig og velutstyrt 8-tonner – 2025-modell.<br>
            Godt rigget med stor lyspakke.
        </p>
    </section>

    <!-- EKSTRAUTSTYR -->
    <section>
        <h2 style="text-align: center;">Ekstrautstyr</h2>
        <div class="utstyr">
            <ul>
                <li>Engcon rototilt</li>
                <li>Pusseskuffe</li>
                <li>Graveskuffe</li>
                <li>Kabelskuffe</li>
                <li>Sorteringsklype</li>
                <li>Meisel / hammer</li>
            </ul>
        </div
